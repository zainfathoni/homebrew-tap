name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check formula syntax
        run: ruby -c Formula/amux.rb && ruby -c Formula/fizzy-md.rb

  install:
    runs-on: macos-latest
    steps:
      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@1f8e202ffddf94def7f42f6fa3a482e821489f9c # 2026.07.10.1
      - name: Install and test formulas
        run: |
          brew install zainfathoni/tap/amux
          brew test zainfathoni/tap/amux
          brew install zainfathoni/tap/fizzy-md
          brew test zainfathoni/tap/fizzy-md
